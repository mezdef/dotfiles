#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[merge-tools.nvimdiff]
program = "nvim"

[preview]
# Preview a revision's full diff in the side panel using delta (non-split)
revision_command = [
  "show",
  "--color",
  "always",
  "-r",
  "$change_id",
  "--config",
  "ui.diff-formatter=delta-non-split-view",
]

# Preview a single file's diff in the side panel using delta (non-split)
file_command = [
  "diff",
  "--color",
  "always",
  "-r",
  "$change_id",
  "$file",
  "--config",
  "ui.diff-formatter=delta-non-split-view",
]

[ui]
merge-tool = "nvimdiff"
editor = ":builtin"
diff-editor = ":builtin"

[ui.colors]
# catppuccin mocha: mauve=#cba6f7, subtext0=#a6adc8, base=#1e1e2e
"help shortcut" = { fg = "#cba6f7" }
"help dimmed" = { fg = "#a6adc8" }
"status title" = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
"status shortcut" = { fg = "#cba6f7" }
"status dimmed" = { fg = "#a6adc8" }
"revset title" = { fg = "#a6adc8", dim = true }
"revset text" = { fg = "#a6adc8", dim = true }
# catppuccin mocha surface1=#45475a
"selected" = { bg = "#45475a", bold = false }
"revisions details selected" = { bg = "#45475a" }
"revisions details added" = { fg = "#a6e3a1" }
"revisions details modified" = { fg = "#f9e2af" }
"revisions details deleted" = { fg = "#f38ba8" }
"revisions details renamed" = { fg = "#94e2d5" }
"revisions details copied" = { fg = "#a6e3a1" }

# Open codediff for selected changeset (working copy vs parent, or commit vs its parent)
# Working copy: opens in editable mode (single rev = diff against working tree)
# Other revisions: opens in read-only mode (two revs = committed diff)
[[actions]]
name = "codediff"
lua = '''
local change_id = context.change_id()
if not change_id then
    flash("No revision selected")
    return
end
-- Check if the selected revision is the working copy
local is_wc, _ = jj("log", "--no-graph", "-r", change_id .. " & @", "-T", "commit_id", "--limit", "1")
if is_wc and is_wc:gsub("%s+", "") ~= "" then
    -- Working copy: pass only the parent so codediff diffs against the working tree (editable)
    local parent_id, err = jj("log", "--no-graph", "-r", change_id .. "-", "-T", "commit_id", "--limit", "1")
    if err then
        flash("Failed to resolve parent: " .. err)
        return
    end
    parent_id = parent_id:gsub("%s+", "")
    exec_shell("nvim -c 'CodeDiff " .. parent_id .. "'")
else
    -- Non-working copy: pass parent and commit for a read-only committed diff
    local full_id, err = jj("log", "--no-graph", "-r", change_id, "-T", "commit_id", "--limit", "1")
    if err then
        flash("Failed to resolve commit: " .. err)
        return
    end
    full_id = full_id:gsub("%s+", "")
    exec_shell("nvim -c 'CodeDiff " .. full_id .. "^ " .. full_id .. "'")
end
'''

# Open codediff for selected changeset against main/master
# Auto-detects whether the repo uses "main" or "master" as the primary branch
[[actions]]
name = "codediff_main"
lua = '''
local change_id = context.change_id()
if not change_id then
    flash("No revision selected")
    return
end
-- Resolve the selected changeset to a git commit ID
local full_id, err = jj("log", "--no-graph", "-r", change_id, "-T", "commit_id", "--limit", "1")
if err then
    flash("Failed to resolve commit: " .. err)
    return
end
full_id = full_id:gsub("%s+", "")
-- Detect whether the repo uses main or master
local main_check, _ = jj("log", "--no-graph", "-r", "main@origin", "-T", "commit_id", "--limit", "1")
local branch = (main_check and main_check:gsub("%s+", "") ~= "") and "main@origin" or "master@origin"
-- Resolve the base branch to a git commit ID
local base_id, base_err = jj("log", "--no-graph", "-r", branch, "-T", "commit_id", "--limit", "1")
if base_err then
    flash("Failed to resolve " .. branch .. ": " .. base_err)
    return
end
base_id = base_id:gsub("%s+", "")
exec_shell("nvim -c 'CodeDiff " .. base_id .. " " .. full_id .. "'")
'''

# Open the selected file in nvim
[[actions]]
name = "open_file"
lua = '''
local file = context.file()
if not file then
    flash("No file selected")
    return
end
exec_shell("nvim " .. file)
'''

# Copy the selected change ID to the system clipboard
[[actions]]
name = "copy_to_clipboard"
lua = '''
local change_id = context.change_id()
if change_id then
    copy_to_clipboard(change_id)
    flash("Copied change ID: " .. change_id)
    return
end
flash("No item selected to copy")
'''

# Bindings
[[bindings]]
action = "codediff"
key = ["d"]
scope = "revisions"
desc = "Open codediff"

[[bindings]]
action = "codediff_main"
key = ["D"]
scope = "revisions"
desc = "Open codediff vs main"

[[bindings]]
action = "open_file"
key = ["o"]
scope = "revisions.details"
desc = "Open file in nvim"

[[bindings]]
action = "copy_to_clipboard"
key = ["Y"]
scope = "revisions"
desc = "Copy change ID"
