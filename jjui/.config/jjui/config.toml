#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[merge-tools.nvimdiff]
program = "nvim"

[preview]
revision_command = [
  "show",
  "--color",
  "always",
  "-r",
  "$change_id",
  "--config",
  "ui.diff-formatter=delta-non-split-view",
]

[ui]
merge-tool = "nvimdiff"
editor = ":builtin"
diff-editor = ":builtin"

[ui.colors]
# catppuccin mocha: mauve=#cba6f7, subtext0=#a6adc8, base=#1e1e2e
"help shortcut" = { fg = "#cba6f7" }
"help dimmed" = { fg = "#a6adc8" }
"status title" = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
"status shortcut" = { fg = "#cba6f7" }
"status dimmed" = { fg = "#a6adc8" }

[custom_commands.open_file]
key = ["o"]
lua = '''
  local file = context.file()
  if not file then
      flash("No file selected")
      return
  end
  exec_shell("nvim " .. file)
'''

[custom_commands.copy_to_clipboard]
key = ["Y"]
lua = '''
local change_id = context.change_id()
if change_id then
    copy_to_clipboard(change_id)
    flash("Copied change ID: " .. change_id)
    return
end
flash("No item selected to copy")
'''
