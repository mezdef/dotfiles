# ~/.tmux.conf
set-environment -g PATH "/opt/homebrew/bin:$PATH"
set-environment -gF TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins" # TPM Path

# General
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g escape-time 0             # zero-out escape time delay
set -g set-clipboard on          # use system clipboard
set -g default-terminal "${TERM}"
set -g mouse on
set -g mode-keys vi

# History
set -g history-file ~/.cache/.zsh_history # Set shared history file
set -g history-limit 1000000     # increase history size (from 2,000)

# Session
set -g detach-on-destroy off     # don't exit from tmux when closing a session

# Window
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g renumber-windows on       # renumber all windows when any window is closed

# Style
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Cursor color by mode (purple in copy mode, white otherwise)
set -g cursor-colour '#cdd6f4'
set-hook -g pane-mode-changed {
  if -F '#{pane_in_mode}' {
    set -p cursor-colour '#cba6f7'
  } {
    set -p cursor-colour '#cdd6f4'
  }
}

# Misc
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Plugins
set -g @plugin 'tmux-plugins/tpm' # Tmux package manger
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax' # Tmux floating pane
set -g @plugin 'omerxx/tmux-sessionx' # Tmux session manager
set -g @plugin 'christoomey/vim-tmux-navigator' # Tmux vim window and pane navigation
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'catppuccin/tmux' # Colorscheme
# Plugins - Continuum
set -g @continuum-restore 'on'
# Plugins - Floax
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'
# Plugisn - SessionX
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-create-new-session 'false' # Do not create new sessions when no results found
set -g @sessionx-bind 'o'
bind -n C-/ run-shell "~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh"

set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-mode 'on' # Search windows by default (instead of sessions)
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Keybindings
unbind-key C-b # Unbind default prefix
set -g prefix C-Space # Set prefix
bind C-Space send-prefix
bind r source-file "~/.config/tmux/tmux.conf" \; display "Config reloaded!"
bind v copy-mode # Vim visual mode

# Keybindings - Window navigation
bind -n C-S-l next-window # Vim window navigation
bind -n C-S-h previous-window # Vim window navigation

# Keybindings - Pane navigation
bind -n C-Enter resize-pane -Z # Max/min current pane
bind -n C-q kill-pane # Kill pane no-confirm. C-BSpace > C-q in Ghostty

# Keybindings - Pane splits
bind -n C-_ split-window -h -c "#{pane_current_path}" # Split horizontal. C-\ > C-_ in Ghostty
bind -n C-\- split-window -v -c "#{pane_current_path}" # Split vertical

# Keybindings - Plugins
set -g @floax-bind '-n C-p' # Ctrl-p for quick floating pane

# Catppuccin
set -g @catppuccin_flavor "mocha"
set -g status-position top
set -g @catppuccin_pane_border_status "off"
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux' # Load catppuccin

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

# Copy mode selection style (must be after catppuccin to avoid override)
set -g mode-style "bg=#{@thm_mauve},fg=#{@thm_bg}"

# Status Life - Left
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
# set -ga status-left "#{#[fg=#{@thm_overlay_0},bg=default]}"

# Status Line - Right
set -g status-right-length 150
set -g status-right ""
set -ga status-right "#{?window_zoomed_flag,#{#[bg=#{@thm_yellow},fg=#{@thm_bg}]  zoom },}"
set -ga status-right "#{?window_zoomed_flag,#{#[fg=#{@thm_overlay_0},bg=default] │ },}"
set -ga status-right "#{#[fg=#{@thm_fg},bg=default] #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}}}"
# set -ga status-right "#{#[fg=#{@thm_overlay_0},bg=default] │ }"
# set -ga status-right "#{#[fg=#{@thm_fg},bg=default] #(~/.config/tmux/scripts/jj-status.sh #{pane_current_path})}"
set -g status-interval 5
# set-option -g status-right "#(~/bin/my_status_script.sh)"

# Status Line
set -g status-style bg=default

# Status Line - Pane Borders
setw -g pane-border-status top
setw -g pane-border-format "#{?pane_active,#[fg=#{@thm_bg} bg=#{@thm_fg}],#[fg=#{@thm_fg}]}#[align=centre] #(~/.config/tmux/plugins/tmux-nerd-font-window-name/bin/tmux-nerd-font-window-name #{pane_current_command} 1) #{?pane_active,#[bg=default],}"
setw -g pane-active-border-style "#{#[fg=#{@thm_overlay_0},bg=default]}"
setw -g pane-border-style "#{#[fg=#{@thm_surface_0},bg=default]}"
setw -g pane-border-lines single

# Status Line - Windows
set -g status-justify "left"
set -wg automatic-rename on
set -g automatic-rename-format "Window"
set -g window-status-format "#{#[fg=#{@thm_overlay_0},bg=default]│ }#{#[fg=#{@thm_overlay_0},bg=default]#I#{?#{!=:#{window_name},Window},:#W }}"
set -g window-status-style "bg=default,fg=#{@thm_fg}"
set -g window-status-last-style "#{fg=#{@thm_fg},bg=default}"
set -g window-status-activity-style "#{fg=#{@thm_bg},bg=#{@thm_red}}"
set -g window-status-bell-style "#{fg=#{@thm_bg},bg=#{@thm_red}}"
set -gF window-status-separator "#{#[fg=#{@thm_overlay_0},bg=default]}"
set -g window-status-current-format "#{#[fg=#{@thm_overlay_0},bg=default]│ }#{#[fg=#{@thm_fg},bg=default]#I#{?#{!=:#{window_name},Window},:#W }}"
